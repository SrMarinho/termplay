<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>termplay — Uno</title>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="topbar">
    <span class="logo"><span class="logo-term">term</span><span class="logo-play">play</span></span>
    <span id="conn" class="conn">connecting…</span>
  </header>

  <!-- Screen: room list -->
  <section id="screen-rooms" class="screen active">
    <div class="wrap">
      <div class="panel">
        <h2 class="panel-title">YOUR NICK</h2>
        <input id="nick" maxlength="16" placeholder="enter nickname" class="field">

        <h2 class="panel-title" style="margin-top:18px">PICK A GAME</h2>
        <div id="game-grid" class="game-grid">
          <button class="game-tile selected" data-game="uno">
            <span class="gt-icon">🃏</span>
            <span class="gt-name">Uno</span>
            <span class="gt-sub">combine cor/valor</span>
          </button>
          <button class="game-tile" data-game="velha">
            <span class="gt-icon">⭕</span>
            <span class="gt-name">Jogo da Velha</span>
            <span class="gt-sub">3 em linha</span>
          </button>
          <button class="game-tile" data-game="hangman">
            <span class="gt-icon">🔤</span>
            <span class="gt-name">Forca</span>
            <span class="gt-sub">adivinhe a palavra</span>
          </button>
          <button class="game-tile" data-game="blackjack">
            <span class="gt-icon">🂡</span>
            <span class="gt-name">Blackjack</span>
            <span class="gt-sub">chegue em 21</span>
          </button>
        </div>

        <div class="host-actions">
          <button id="host-btn" class="btn primary">＋ Host a Room</button>
          <span id="host-hint" class="muted"></span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">OPEN ROOMS</h2>
          <span id="room-count" class="muted"></span>
        </div>
        <ul id="room-list" class="room-list"></ul>
        <p id="no-rooms" class="muted">Scanning the LAN for rooms…</p>
      </div>
    </div>
  </section>

  <!-- Screen: lobby -->
  <section id="screen-lobby" class="screen">
    <div class="wrap">
      <div class="lobby-grid">
        <div class="panel players-panel">
          <h2 class="panel-title">PLAYERS <span id="lobby-code" class="code"></span></h2>
          <ul id="lobby-players" class="player-list"></ul>
          <p id="start-hint" class="muted lobby-hint"></p>
          <div class="lobby-footer">
            <div id="host-controls" class="host-controls hidden">
              <button id="start-btn" class="btn primary">▶ Start Game</button>
              <button id="addbot-btn" class="btn secondary">＋ Add Bot</button>
              <button id="rules-btn" class="btn ghost hidden">⚙ Regras</button>
            </div>
            <p id="guest-wait" class="muted">Waiting for the host to start…</p>
            <button id="leave-btn" class="btn ghost">Leave</button>
          </div>
        </div>

        <div class="panel chat-panel">
          <h2 class="panel-title">CHAT</h2>
          <ul id="chat-log" class="chat-log"></ul>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" class="field" placeholder="message…" autocomplete="off">
            <button class="btn secondary">Send</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Screen: Uno game -->
  <section id="screen-game" class="screen game">
    <div class="game-head">
      <span class="logo small"><span class="logo-term">term</span><span class="logo-play">play</span></span>
      <span class="game-meta"></span>
      <button id="uno-quit" class="btn ghost">leave</button>
    </div>

    <div id="uno-stage" class="uno-stage hidden">
    <div id="uno-opponents" class="opponents"></div>

    <div class="table">
      <div id="uno-drawpile" class="drawpile" title="Draw card"></div>
      <div id="uno-direction" class="direction-indicator">↻</div>
      <div class="discard-wrap">
        <div id="uno-discard" class="discard"></div>
        <span id="uno-colorbadge" class="color-badge"></span>
      </div>
    </div>

    <div id="uno-message" class="uno-message"></div>
    <div id="uno-timer" class="turn-timer hidden">
      <div class="timer-bar-wrap"><div id="uno-timer-bar" class="timer-bar"></div></div>
      <span id="uno-timer-label" class="timer-label">30</span>
    </div>

    <div id="uno-color-picker" class="color-picker hidden">
      <span class="muted">pick a color:</span>
      <button data-color="R" class="chip R">R</button>
      <button data-color="G" class="chip G">G</button>
      <button data-color="B" class="chip B">B</button>
      <button data-color="Y" class="chip Y">Y</button>
    </div>

    <div class="hand-zone">
      <div id="uno-handinfo" class="hand-info"></div>
      <div id="uno-hand" class="hand"></div>
    </div>
    </div><!-- /uno-stage -->
  </section>

  <!-- Rules modal (host configures Uno variants in the lobby) -->
  <div id="rules-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 class="modal-title">⚙ Regras do Uno</h3>
      <p class="muted">Escolha uma predefinição ou monte as suas regras.</p>
      <div id="preset-chips" class="preset-chips">
        <button class="preset-chip" data-preset="standard">Standard</button>
        <button class="preset-chip" data-preset="br">🇧🇷 Brazilian</button>
        <button class="preset-chip custom" data-preset="custom" disabled>Custom</button>
      </div>
      <ul id="rule-toggles" class="rule-toggles"></ul>
      <div class="modal-actions">
        <button id="rules-cancel" class="btn ghost">Cancelar</button>
        <button id="rules-save" class="btn primary">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
